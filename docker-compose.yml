version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: bike_share_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bike_share_db
      MYSQL_USER: bikeuser
      MYSQL_PASSWORD: bikepassword
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
